services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: toolrent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-toolrent}
      POSTGRES_USER:     ${DB_USERNAME:-toolrent}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-toolrent}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-toolrent} -d ${DB_NAME:-toolrent}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: toolrent-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-toolrent}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-toolrent}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./toolrent-backend
      dockerfile: Dockerfile
    container_name: toolrent-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL:      jdbc:postgresql://postgres:5432/${DB_NAME:-toolrent}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-toolrent}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-toolrent}
      SPRING_DATA_REDIS_HOST:     redis
      SPRING_DATA_REDIS_PORT:     6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-toolrent}
      APP_JWT_SECRET:             ${JWT_SECRET:-toolrent-super-secret-key-32-minimum-chars}
      APP_JWT_EXPIRATION_MS:      ${JWT_EXPIRATION_MS:-3600000}
      APP_JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-604800000}
      APP_RAZORPAY_KEY_ID:        ${RAZORPAY_KEY_ID:-}
      APP_RAZORPAY_KEY_SECRET:    ${RAZORPAY_KEY_SECRET:-}
      APP_CORS_ALLOWED_ORIGINS:   ${CORS_ALLOWED_ORIGINS:-http://localhost:80,http://localhost:5173}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/auth/health 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── React + Nginx Frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./toolrent-frontend
      dockerfile: Dockerfile
    container_name: toolrent-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
