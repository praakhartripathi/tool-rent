spring:
  application:
    name: toolrent-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/toolrent
    username: ${DB_USERNAME:toolrent}
    password: ${DB_PASSWORD:toolrent}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

server:
  port: 8080
  servlet:
    context-path: /api

app:
  jwt:
    secret: ${JWT_SECRET:toolrent-super-secret-key-change-in-production-mustbe32chars}
    expiration-ms: 3600000          # 1 hour
    refresh-expiration-ms: 604800000 # 7 days

  razorpay:
    key-id: ${RAZORPAY_KEY_ID:rzp_test_your_key}
    key-secret: ${RAZORPAY_KEY_SECRET:your_secret}

  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000,https://*.toolrent.in

logging:
  level:
    in.toolrent: DEBUG
    org.springframework.security: INFO
